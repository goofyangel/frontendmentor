<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>
</head>
<body>
  <div class="col-layout-left">
    <img class="huddle-logo" src="./images/logo.svg" alt="huddle logo" />
    <img class="mockups" src="./images/illustration-mockups.svg" alt="mockups" />
  </div>
  <div class="col-layout-right">
    <div class="huddle">
      <h1 class="huddle_header">
        Build The Community Your Fans Will Love
      </h1>
      <p class="huddle_description">
        Huddle re-imagines the way we build communities. You have a voice, but so does your audience. 
        Create connections with your users as you engage in genuine discussion.
      </p>
      <button>Register</button>
    </div>
    <div class="huddle-icons">
      <img class="huddle-icon_facebook" src="./images/facebook.svg" alt="facebook icon" />
      <img class="huddle-icon_twitter" src="./images/twitter.svg" alt="twitter icon" />
      <img class="huddle-icon_instagram" src="./images/instagram.svg" alt="instagram icon" />
    </div>
  </div>
  <footer>
    <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="https://github.com/goofyangel">goofyangel</a>.
    </p>
  </footer>
</body>
</html>
