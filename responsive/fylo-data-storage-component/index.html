<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
  <title>Frontend Mentor | Fylo data storage component</title>
</head>
<body>
  <div class="fylo-container">
    <div class="fylo-left-col">
      <img class="fylo-logo" src="./images/logo.svg" alt="logo" />
      <div class="fylo-icons">
        <div class="fylo-icon_document">
          <img src="./images/icon-document.svg" alt="document icon"/>
        </div>
        <div class="fylo-icon_folder">
          <img src="./images/icon-folder.svg" alt="folder icon"/>
        </div>
        <div class="fylo-icon_upload">
          <img src="./images/icon-upload.svg" alt="upload icon"/>
        </div>
      </div>
    </div>
    <div class="fylo-right-col">
      <p class="storage-usage">
        You’ve used <b>815 GB</b> of your storage
      </p>
      <div class="total-data">
        <div class="data-used">
          <div class="white-ball"></div>
        </div>
      </div>
      <div class="usage-stats">
        <p>0 GB</p>
        <p>1000 GB</p>
      </div>
      <div class="remaining-container">
        <div class="remaining-data">
          <span>185</span>
          <p>GB LEFT</p>
        </div>
        <div class="sharp-tail"></div>
      </div>
    </div>
  </div>
  <div class="background" alt="background image"></div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/goofyangel">goofyangel</a>.
  </div>
</body>
</html>
