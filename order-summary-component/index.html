<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
  <title>Frontend Mentor | Order summary card</title>
</head>
<body>
  <div class="order-card">
    <img class="order-card_image" src="./images/illustration-hero.svg" alt="music illustration hero" />
    <div class="order-card_info">
      <h1 class="order-card_title">Order Summary</h1>
      <p class="order-card_description">
        You can now listen to millions of songs, audiobooks, and podcasts on any 
        device anywhere you like!
      </p>
      <div class="order-card_plan">
        Annual Plan
        $59.99/year
        Change
      </div>
      <div class="button-group">
        <span class="button-group_payment">Proceed to Payment</span>
        <span class="button-group_order">Cancel Order</span>
      </div>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/goofyangel">goofyangel</a>.
  </div>
</body>
</html>
