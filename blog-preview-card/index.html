<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <title>Frontend Mentor | Blog preview card</title>  
</head>
<body>
  <div class="blog-card">
    <img class="blog-card_image" src="./images/illustration-article.svg" />
    <div class="blog-card_info">
      <p class="blog-card_category">Learning</p>
      <p class="blog-card_date">Published 21 Dec 2023</p>
    </div>
    <h1 class="blog-card_title">
      HTML & CSS foundations
    </h1>
    <p class="blog-card_description">
      These languages are the backbone of every website, defining structure, content, and presentation.
    </p>
    <div class="blog-card_author">
      <img class="blog-card-author_image" src="./images/image-avatar.webp" />
      <span>Greg Hooper</span>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/goofyangel">goofyangel</a>.
  </div>
</body>
</html>
