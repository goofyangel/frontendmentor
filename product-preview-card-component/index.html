<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <title>Frontend Mentor | Product preview card component</title>
</head>
<body>
  <div class="preview-card">
    <picture class="preview-card_image">
      <source srcset="./images/image-product-mobile.jpg" alt="desktop perfume image" media="(max-width: 768px)" />
      <img src="./images/image-product-desktop.jpg" alt="desktop perfume image" />
    </picture>
    <div class="preview-details">
      <p class="preview-details_category">Perfume</p>
      <h1 class="preview-details_header">Gabrielle Essence Eau De Parfum</h1>
      <p class="preview-details_description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.
      </p>
      <div class="preview-details_price">
        <h1 class="preview-details-price_new">$149.99</h1>
        <p class="preview-details-price_old">$169.99</p>
      </div>
      <button>
        <img src="./images/icon-cart.svg" alt="cart icon" />
        Add to Cart
      </button>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
</body>
</html>
