<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Stats preview card component</title>
</head>
<body>
  <div class="container">
    <div class="stats-card">
      <div class="stats-card_header">
        <h1 class="stats-card_title">
          Get <span>insights</span> that help your business grow.
        </h1>
        <p class="stats-card_info">
          Discover the benefits of data analytics and make better decisions regarding revenue, customer 
          experience, and overall efficiency.
        </p>
      </div>
      <div class="stats-card_statistics">
        <div class="stats-card_statistic">
          <h2 class="stats-card_stat">10k+</h2>
          <h3 class="stats-card-stat_text">companies</h3>
        </div>
        <div class="stats-card_statistic">
          <h2 class="stats-card_stat">314</h2>
          <h3 class="stats-card-stat_text">templates</h3>
        </div>
        <div class="stats-card_statistic">
          <h2 class="stats-card_stat">12M+</h2>
          <h3 class="stats-card-stat_text">queries</h3>
        </div>
      </div>
    </div>
    <picture class="stats-image">
      <img src="./images/image-header-desktop.jpg" alt="people working on laptops" />
    </picture>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/goofyangel">goofyangel</a>.
  </div>
</body>
</html>
