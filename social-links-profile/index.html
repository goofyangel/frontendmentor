<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
  <div class="social-card">
    <img class="social-card_image" src="./images/avatar-jessica.jpeg" />
    <div class="social-card_info">
      <h1 class="social-card-info_name">Jessica Randall</h1>
      <h3 class="social-card-info_location">London, United Kingdom</h3>
    </div>
    <p class="social-card_description">"Front-end developer and avid reader."</p>
    <div class="social-card_links">
      <span class="social-card_link">GitHub</span>
      <span class="social-card_link">Frontend Mentor</span>
      <span class="social-card_link">LinkedIn</span>
      <span class="social-card_link">Twitter</span>
      <span class="social-card_link">Instagram</span>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/goofyangel">goofyangel</a>.
  </div>
</body>
</html>
