<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
  <title>Frontend Mentor | NFT preview card component</title>
</head>
<body>
  <div class="nft-card">
    <picture class="nft-card_image">
      <img src="./images/image-equilibrium.jpg" alt="ethereum cube">
      <div>
        <img src="./images/icon-view.svg" alt="eye icon" />
      </div>
    </picture>
    <p class="nft-card_title">Equilibrium #3429</h1>
    <p class="nft-card_description">Our Equilibrium collection promotes balance and calm.</h1>
    <div class="nft-card_details">
      <div class="nft-card-details_eth">
        <img src="./images/icon-ethereum.svg" alt="ethereum icon" />
        0.041 ETH
      </div>
      <div class="nft-card-details_time">
        <img src="./images/icon-clock.svg" alt="clock icon" />
        3 days left
      </div>
    </div>
    <hr />
    <div class="nft-card_author">
      <img src="./images/image-avatar.png" alt="author avatar" />
      <div>
        <p>Creation of <span>Jules Wyvern</span></p>
      </div>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/goofyangel">goofyangel</a>.
  </div>
</body>
</html>
